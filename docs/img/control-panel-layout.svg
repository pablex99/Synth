<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="820" viewBox="0 0 1800 820">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .title { font-family: Segoe UI, Arial, sans-serif; font-size: 28px; fill: #111827; font-weight: 700; }
      .label { font-family: Segoe UI, Arial, sans-serif; font-size: 22px; fill: #111827; font-weight: 600; }
      .small { font-family: Segoe UI, Arial, sans-serif; font-size: 18px; fill: #1f2937; }
      .potBody { fill: #f8fafc; stroke: #111827; stroke-width: 2; }
      .potShaft { stroke: #111827; stroke-width: 3; }
      .knobOuter { fill: #ffffff; stroke: #111827; stroke-width: 3; }
      .knobInner { fill: #9ca3af; stroke: #111827; stroke-width: 1.5; }
      .btnOuter { fill: #ffffff; stroke: #111827; stroke-width: 3; }
      .btnWhite { fill: #ffffff; stroke: #111827; stroke-width: 2; }
      .btnRed { fill: #e11d48; stroke: #111827; stroke-width: 2; }
    </style>
  </defs>

  <rect class="bg" x="0" y="0" width="1800" height="820"/>

  <!-- Potenciometros de izquierda a derecha: I5 -> I0 (equivale a derecha a izquierda I0->I5) -->
  <!-- I5 -->
  <text class="label" x="140" y="90" text-anchor="middle">Delay Mix</text>
  <text class="small" x="140" y="118" text-anchor="middle">I5</text>
  <rect class="potBody" x="90" y="160" width="100" height="90" rx="10" ry="10"/>
  <line class="potShaft" x1="140" y1="250" x2="140" y2="290"/>
  <circle class="knobOuter" cx="140" cy="205" r="24"/>
  <circle class="knobInner" cx="140" cy="205" r="10"/>

  <!-- I4 -->
  <text class="label" x="390" y="90" text-anchor="middle">Reverb Mix</text>
  <text class="small" x="390" y="118" text-anchor="middle">I4</text>
  <rect class="potBody" x="340" y="160" width="100" height="90" rx="10" ry="10"/>
  <line class="potShaft" x1="390" y1="250" x2="390" y2="290"/>
  <circle class="knobOuter" cx="390" cy="205" r="24"/>
  <circle class="knobInner" cx="390" cy="205" r="10"/>

  <!-- I3 -->
  <text class="label" x="640" y="90" text-anchor="middle">Filter Morph</text>
  <text class="small" x="640" y="118" text-anchor="middle">I3</text>
  <rect class="potBody" x="590" y="160" width="100" height="90" rx="10" ry="10"/>
  <line class="potShaft" x1="640" y1="250" x2="640" y2="290"/>
  <circle class="knobOuter" cx="640" cy="205" r="24"/>
  <circle class="knobInner" cx="640" cy="205" r="10"/>

  <!-- I2 -->
  <text class="label" x="890" y="90" text-anchor="middle">Pitch Base Nota</text>
  <text class="small" x="890" y="118" text-anchor="middle">I2</text>
  <rect class="potBody" x="840" y="160" width="100" height="90" rx="10" ry="10"/>
  <line class="potShaft" x1="890" y1="250" x2="890" y2="290"/>
  <circle class="knobOuter" cx="890" cy="205" r="24"/>
  <circle class="knobInner" cx="890" cy="205" r="10"/>

  <!-- I1 -->
  <text class="label" x="1140" y="90" text-anchor="middle">BPM Sirena</text>
  <text class="small" x="1140" y="118" text-anchor="middle">I1</text>
  <rect class="potBody" x="1090" y="160" width="100" height="90" rx="10" ry="10"/>
  <line class="potShaft" x1="1140" y1="250" x2="1140" y2="290"/>
  <circle class="knobOuter" cx="1140" cy="205" r="24"/>
  <circle class="knobInner" cx="1140" cy="205" r="10"/>

  <!-- I0 -->
  <text class="label" x="1390" y="90" text-anchor="middle">Ganancia General</text>
  <text class="small" x="1390" y="118" text-anchor="middle">I0</text>
  <rect class="potBody" x="1340" y="160" width="100" height="90" rx="10" ry="10"/>
  <line class="potShaft" x1="1390" y1="250" x2="1390" y2="290"/>
  <circle class="knobOuter" cx="1390" cy="205" r="24"/>
  <circle class="knobInner" cx="1390" cy="205" r="10"/>

  <!-- Botones -->
  <text class="label" x="1530" y="90" text-anchor="middle">Boton blanco (GPIO13)</text>
  <circle class="btnOuter" cx="1530" cy="205" r="38"/>
  <circle class="btnWhite" cx="1530" cy="205" r="19"/>
  <text class="small" x="1530" y="330" text-anchor="middle">Toque: onda parametro</text>
  <text class="small" x="1530" y="356" text-anchor="middle">Sostenido: activa/desactiva</text>
  <text class="small" x="1530" y="382" text-anchor="middle">onda parametro</text>

  <text class="label" x="1690" y="90" text-anchor="middle">Boton rojo (GPIO27)</text>
  <circle class="btnOuter" cx="1690" cy="205" r="38"/>
  <circle class="btnRed" cx="1690" cy="205" r="19"/>
  <text class="small" x="1690" y="330" text-anchor="middle">Toque: onda base</text>
  <text class="small" x="1690" y="356" text-anchor="middle">Sostenido: cambia de pagina</text>
</svg>
