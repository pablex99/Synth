<svg xmlns="http://www.w3.org/2000/svg" width="1500" height="520" viewBox="0 0 1500 520">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      .box { fill: #f8fafc; stroke: #111827; stroke-width: 2; rx: 12; ry: 12; }
      .box2 { fill: #eef2ff; stroke: #111827; stroke-width: 2; rx: 12; ry: 12; }
      .txt { font-family: Segoe UI, Arial, sans-serif; font-size: 26px; fill: #111827; font-weight: 600; }
      .sub { font-family: Segoe UI, Arial, sans-serif; font-size: 20px; fill: #111827; }
      .arrow { stroke: #111827; stroke-width: 3; fill: none; }
    </style>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#111827"/>
    </marker>
  </defs>

  <rect class="bg" x="0" y="0" width="1500" height="520"/>

  <!-- Fila superior -->
  <rect class="box" x="40" y="70" width="230" height="80"/>
  <text class="txt" x="155" y="115" text-anchor="middle">Potenciometros</text>
  <text class="sub" x="155" y="140" text-anchor="middle">I0-I5</text>

  <rect class="box" x="320" y="70" width="180" height="80"/>
  <text class="txt" x="410" y="118" text-anchor="middle">CD4067</text>

  <rect class="box2" x="560" y="70" width="170" height="80"/>
  <text class="txt" x="645" y="118" text-anchor="middle">ESP32</text>

  <rect class="box" x="790" y="70" width="210" height="80"/>
  <text class="txt" x="895" y="118" text-anchor="middle">PCM5102A</text>

  <rect class="box" x="1060" y="70" width="390" height="80"/>
  <text class="txt" x="1255" y="118" text-anchor="middle">Senal analogica de audio</text>

  <!-- Fila inferior -->
  <rect class="box" x="120" y="320" width="280" height="80"/>
  <text class="txt" x="260" y="367" text-anchor="middle">Botones GPIO13/GPIO27</text>

  <rect class="box" x="790" y="320" width="210" height="80"/>
  <text class="txt" x="895" y="367" text-anchor="middle">OLED I2C</text>

  <rect class="box" x="1060" y="320" width="200" height="80"/>
  <text class="txt" x="1160" y="367" text-anchor="middle">Interfaz</text>

  <!-- Flechas fila superior rectas -->
  <line class="arrow" x1="270" y1="110" x2="320" y2="110" marker-end="url(#arrow)"/>
  <line class="arrow" x1="500" y1="110" x2="560" y2="110" marker-end="url(#arrow)"/>
  <line class="arrow" x1="730" y1="110" x2="790" y2="110" marker-end="url(#arrow)"/>
  <line class="arrow" x1="1000" y1="110" x2="1060" y2="110" marker-end="url(#arrow)"/>

  <!-- Flecha Botones -> ESP32 (ortogonal, entra por izquierda) -->
  <polyline class="arrow" points="400,360 520,360 520,110 560,110" marker-end="url(#arrow)"/>

  <!-- Flecha ESP32 -> OLED (ortogonal, sale por derecha y entra por izquierda) -->
  <polyline class="arrow" points="730,110 760,110 760,360 790,360" marker-end="url(#arrow)"/>

  <!-- Flecha OLED -> Interfaz recta -->
  <line class="arrow" x1="1000" y1="360" x2="1060" y2="360" marker-end="url(#arrow)"/>
</svg>
